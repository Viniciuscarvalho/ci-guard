<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 240" width="1200" height="240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f14;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0f1f18;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#10b981;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#34d399;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e2e8f0"/>
      <stop offset="100%" style="stop-color:#94a3b8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="greenGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="240" fill="url(#bg)" rx="8"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="40" x2="1200" y2="40"/>
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="200" y1="0" x2="200" y2="240"/>
    <line x1="400" y1="0" x2="400" y2="240"/>
    <line x1="600" y1="0" x2="600" y2="240"/>
    <line x1="800" y1="0" x2="800" y2="240"/>
    <line x1="1000" y1="0" x2="1000" y2="240"/>
  </g>

  <!-- Left accent glow blob -->
  <ellipse cx="60" cy="120" rx="80" ry="80" fill="#10b981" opacity="0.06"/>

  <!-- === LEFT SIDE: shield icon === -->
  <!-- Shield outer shape (centered at x=170, y=120) -->
  <path d="M170,40 L220,62 L220,118 Q220,160 170,188 Q120,160 120,118 L120,62 Z"
    fill="none" stroke="url(#shieldGrad)" stroke-width="2.5" opacity="0.7" filter="url(#glow)"/>

  <!-- Shield inner fill subtle -->
  <path d="M170,44 L216,65 L216,118 Q216,157 170,183 Q124,157 124,118 L124,65 Z"
    fill="#10b981" opacity="0.06"/>

  <!-- Check mark inside shield -->
  <polyline points="149,116 163,132 193,100"
    fill="none" stroke="#10b981" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"
    filter="url(#greenGlow)" opacity="0.9"/>

  <!-- Divider line (vertical) -->
  <line x1="260" y1="30" x2="260" y2="210" stroke="#10b981" stroke-width="1" opacity="0.3"/>

  <!-- === RIGHT SIDE: wordmark + tagline === -->

  <!-- ci-guard wordmark -->
  <text x="290" y="100"
    font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', 'Consolas', monospace"
    font-size="52"
    font-weight="700"
    fill="#e2e8f0"
    letter-spacing="-1">ci-guard</text>

  <!-- Tagline -->
  <text x="292" y="138"
    font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', 'Consolas', monospace"
    font-size="17"
    fill="#10b981"
    letter-spacing="0.5">classify before you retry</text>

  <!-- Sub-tagline -->
  <text x="292" y="162"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="15"
    fill="#64748b"
    letter-spacing="0.3">Failure classification · flaky ledger · cost guard · quarantine</text>

  <!-- Bottom accent line -->
  <line x1="0" y1="225" x2="1200" y2="225" stroke="url(#accentLine)" stroke-width="2"/>

  <!-- Flow diagram: fail → classify → gate → merge -->
  <g transform="translate(292, 188)" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="12" fill="#475569">
    <!-- fail box -->
    <rect x="0" y="0" width="44" height="22" rx="4" fill="#1e293b" stroke="#7f1d1d" stroke-width="1"/>
    <text x="22" y="15" text-anchor="middle" fill="#fca5a5">fail</text>
    <!-- arrow -->
    <text x="52" y="15" fill="#10b981">→</text>
    <!-- classify box -->
    <rect x="68" y="0" width="72" height="22" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="104" y="15" text-anchor="middle" fill="#94a3b8">classify</text>
    <!-- arrow -->
    <text x="148" y="15" fill="#10b981">→</text>
    <!-- gate box (highlighted) -->
    <rect x="164" y="0" width="48" height="22" rx="4" fill="#1e293b" stroke="#10b981" stroke-width="1"/>
    <text x="188" y="15" text-anchor="middle" fill="#34d399">gate</text>
    <!-- arrow -->
    <text x="220" y="15" fill="#10b981">→</text>
    <!-- merge box -->
    <rect x="236" y="0" width="56" height="22" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="264" y="15" text-anchor="middle" fill="#94a3b8">merge</text>
  </g>

  <!-- Top-right: version badge -->
  <g transform="translate(1076, 20)">
    <rect x="0" y="0" width="104" height="24" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="52" y="16" text-anchor="middle"
      font-family="'SF Mono', 'Fira Code', 'Consolas', monospace"
      font-size="12" fill="#64748b">v1.0.0 · MIT</text>
  </g>
</svg>
