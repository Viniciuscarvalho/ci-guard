interface:
  display_name: "CI Guard"
  short_description: "Classify CI failures before retry; verify flaky greens before trust"
  default_prompt: "Run the ci-guard gate on the current PR. If `.ci-guard/scripts/ci_watch.py` is missing, tell the user to run the per-project bootstrap from the README and stop. Otherwise, snapshot once with `python3 .ci-guard/scripts/ci_watch.py --pr auto --once` and inspect the JSON. Report each failed check with its classification (branch_failure / infra_flake / test_flake / dependency_failure / unknown) and the recommended action. Never run `gh run rerun` directly — it bypasses the cost guard and the flaky ledger. If a failure is classified `infra_flake` or `test_flake` and the retry budget is not exhausted, run `python3 .ci-guard/scripts/ci_watch.py --pr auto --retry-failed-now`; the script re-enforces classification and budget itself. For any check in the flaky ledger that transitions failing → green, run `python3 .ci-guard/scripts/ci_watch.py --pr auto --verify-flaky-green` exactly once before trusting it. After the gate completes, stop — do not patch unrelated tests, do not poll review comments, do not wait for merge; defer end-to-end PR monitoring to the babysit-pr skill. Surface any quarantine candidates the ledger flags, but never quarantine a test without explicit user confirmation. If a classification is `unknown` and one manual diagnosis pass still leaves it ambiguous, surface to the user instead of defaulting to retry."
